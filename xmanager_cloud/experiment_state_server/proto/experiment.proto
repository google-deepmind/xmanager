syntax = "proto3";

package cloud.xmanager.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "xmanager_cloud/experiment_state_server/proto/priority.proto";
import "xmanager_cloud/experiment_state_server/proto/resources.proto";
import "xmanager_cloud/experiment_state_server/proto/status.proto";
import "xmanager_cloud/experiment_state_server/proto/url.proto";
import "xmanager_cloud/xid_service/proto/messages.proto";

option java_multiple_files = true;

message Experiment {
  option (google.api.resource) = {
    type: "cloud.xmanager.googleapis.com/Experiment"
    pattern: "experiments/{xid}"
    singular: "experiment"
    plural: "experiments"
  };

  // Resource name of the experiment.
  // Format: experiments/{xid}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];
  // Title for the experiment.
  string title = 2 [(google.api.field_behavior) = REQUIRED];
  // IAM principal which started the experiment. This is derived from the
  // calling user's identity.
  string creator = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  // ACLs to control access to the experiment. These are passed to the XID
  // service when creating the XID. The XID service will use these ACLs to
  // enforce access control on the XID.
  XidAcls acls = 4 [(google.api.field_behavior) = REQUIRED];
  // The priority of the experiment.
  Priority priority = 5 [(google.api.field_behavior) = REQUIRED];
  // Time when the experiment was created.
  google.protobuf.Timestamp create_time = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];
  // Time when the experiment was last updated.
  google.protobuf.Timestamp update_time = 7
      [(google.api.field_behavior) = OUTPUT_ONLY];
  // Time when the experiment was moved to a terminal state.
  google.protobuf.Timestamp complete_time = 8
      [(google.api.field_behavior) = OUTPUT_ONLY];
  // Status of the experiment. Output only as the user should not be able to
  // update the status.
  ExperimentStatus status = 9 [(google.api.field_behavior) = OUTPUT_ONLY];
  // URLs associated with the experiment.
  repeated Url urls = 10 [(google.api.field_behavior) = OPTIONAL];
  // Tags associated with the experiment.
  repeated string tags = 11 [(google.api.field_behavior) = OPTIONAL];
  // Notes associated with the experiment.
  string notes = 12 [(google.api.field_behavior) = OPTIONAL];
  // Resources associated with the experiment. This returns a minimal set of
  // resources that covers all work units in the experiment. E.G. if two work
  // units require 1 V100 each, this will return 2 V100s, not 2 x 1 V100s.
  repeated ResourceSet resources = 13
      [(google.api.field_behavior) = OUTPUT_ONLY];
}
