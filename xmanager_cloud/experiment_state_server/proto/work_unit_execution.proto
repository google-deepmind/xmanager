syntax = "proto3";

package cloud.xmanager.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "xmanager_cloud/experiment_state_server/proto/status.proto";

option java_multiple_files = true;

message WorkUnitExecution {
  option (google.api.resource) = {
    type: "cloud.xmanager.googleapis.com/WorkUnitExecution"
    pattern: "experiments/{xid}/workUnits/{wid}/executions/{execution_id}"
    singular: "workUnitExecution"
    plural: "workUnitExecutions"
  };

  enum WorkUnitExecutionState {
    WORK_UNIT_EXECUTION_STATE_UNSPECIFIED = 0;
    // The work unit execution is active.
    ACTIVE = 1;
    // The work unit execution is inactive; it is not currently the active
    // execution associated with the work unit.
    INACTIVE = 2;
  }

  // Resource name of the work unit execution.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];
  // Time when the work unit execution was created.
  google.protobuf.Timestamp create_time = 2
      [(google.api.field_behavior) = OUTPUT_ONLY];
  // Time when the work unit execution was last updated.
  google.protobuf.Timestamp update_time = 3
      [(google.api.field_behavior) = OUTPUT_ONLY];
  // Time when the work unit execution was moved to a terminal state.
  google.protobuf.Timestamp complete_time = 7
      [(google.api.field_behavior) = OUTPUT_ONLY];
  // Status of the work unit execution. Output only as the user should not be
  // able to update the status.
  WorkUnitStatus status = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  // State of the work unit execution. Output only as the user should not be
  // able to update the state.
  WorkUnitExecutionState state = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Metadata for the Kubernetes resources associated with the work unit
  // execution.
  WorkUnitExecutionMetadata metadata = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Represents basic information about a Kubernetes cluster
message ClusterInfo {
  string project = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  string location = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  string cluster_name = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Metadata for the Kubernetes resources associated with a WorkUnitExecution.
// This information is used to construct the URLs of the Kubernetes resources
// associated with a WorkUnitExecution.
message WorkUnitExecutionMetadata {
  enum WorkUnitExecutionType {
    WORK_UNIT_EXECUTION_TYPE_UNSPECIFIED = 0;
    JOB_SET = 1;
  }

  // Information about the cluster where this metadata is being generated
  // and where the primary JobSet/Workload objects reside.
  ClusterInfo management_cluster = 1
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Information about the cluster where the workload is currently
  // admitted/executing. This information is updated by the MultiKueue
  // controller in the management cluster.
  ClusterInfo executing_cluster = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  WorkUnitExecutionType type = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Name of the JobSet
  string resource_name = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Namespace of the JobSet
  string namespace = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
  // Service account used by the JobSet's pods
  string service_account = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Node selectors applied by Kueue, derived from the chosen ResourceFlavor.
  map<string, string> node_selectors = 7
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // The name of the Kueue ResourceFlavor used.
  string resource_flavor = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The name of the MultiKueueCluster used.
  string multi_kueue_cluster_name = 9
      [(google.api.field_behavior) = OUTPUT_ONLY];
}
