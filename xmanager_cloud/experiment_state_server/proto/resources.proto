syntax = "proto3";

package cloud.xmanager.v1;

option java_multiple_files = true;

// ResourceSet is the set of resources that are required to run an executable.
message ResourceSet {
  // The type of resource set. This is a oneof to allow for different resource
  // types to be added in the future.
  oneof resources {
    CpuResources cpu_resources = 1;
    GpuResources gpu_resources = 2;
    TpuResources tpu_resources = 3;
  }

  // The amount of ephemeral storage to use in bytes.
  int64 ephemeral_storage_bytes = 4;
}

// CpuResources represents a set of CPU and memory resources.
message CpuResources {
  // The number of millicores to use.
  int64 cpu_millicores = 1;
  // The amount of memory to use in bytes.
  int64 memory_bytes = 2;
}

// GpuResources represents a set of GPU resources.
message GpuResources {
  // The type of GPU to use.
  string type = 1;

  // The number of GPUs to use. This is a scalar value.
  int64 count = 2;
}

// TpuResources represents a set of TPU resources.
message TpuResources {
  // The type of TPU to use.
  string type = 1;

  // The topology of the TPU job in order of the dimensions.
  string topology = 2;
}
