syntax = "proto3";

package cloud.xmanager.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "xmanager_cloud/experiment_state_server/proto/structured_message.proto";

option java_multiple_files = true;
option java_outer_classname = "StatusMessageOuterClass";

message StatusMessage {
  option (google.api.resource) = {
    type: "cloud.xmanager.googleapis.com/StatusMessage"
    pattern: "experiments/{xid}/statusMessages/{status_message}"
    pattern: "experiments/{xid}/workUnits/{wid}/statusMessages/{status_message}"
    singular: "statusMessage"
    plural: "statusMessages"
  };

  // Resource name of the status message.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The structured message content of the status message.
  StructuredMessage content = 2;

  // ID of the work unit execution that generated the message. Optional.
  int64 execution_id = 3;
}
